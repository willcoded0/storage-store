name: Deploy Storage Store

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.BATSERVER_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.BATSERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync site files
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ "${{ secrets.BATSERVER_USER }}@${{ secrets.BATSERVER_HOST }}:/srv/sites/storage-store/"

      - name: Ensure site service exists
        run: |
          ssh "${{ secrets.BATSERVER_USER }}@${{ secrets.BATSERVER_HOST }}" <<'REMOTE'
          set -euo pipefail
          mkdir -p /srv/sites/storage-store
          cat >/etc/systemd/system/site-storage-store.service <<'SERVICE'
          [Unit]
          Description=Static site storage-store
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/srv/sites/storage-store
          ExecStart=/usr/bin/python3 -m http.server 8787 --bind 127.0.0.1
          Restart=always
          RestartSec=3
          User=root

          [Install]
          WantedBy=multi-user.target
          SERVICE

          systemctl daemon-reload
          systemctl enable --now site-storage-store.service
          systemctl restart site-storage-store.service
          curl -I --max-time 10 http://127.0.0.1:8787 >/dev/null
          REMOTE

      - name: Health check
        run: curl -I --max-time 20 https://project.batmap.win
